Section "Device"
    Identifier  "dummy"
    Driver      "dummy"
    # VideoRam in kB; 256 MB covers up to 8192x4096x32
    VideoRam    262144
EndSection

Section "Monitor"
    Identifier  "monitor"
    HorizSync   28.0-80.0
    VertRefresh 48.0-75.0
EndSection

Section "Screen"
    Identifier   "screen"
    Device       "dummy"
    Monitor      "monitor"
    DefaultDepth 24
    SubSection "Display"
        Depth   24
        Modes   "1920x1080"
        # Virtual defines the maximum framebuffer; RandR can resize within this
        Virtual 3840 2160
    EndSubSection
EndSection
