apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dev-workspace-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-environment
  labels:
    app: dev-environment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dev-environment
  template:
    metadata:
      labels:
        app: dev-environment
    spec:
      containers:
        - name: dev-environment
          image: ghcr.io/your-org/dev-novnc-vscode:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NOVNC_PORT
              value: "6080"
            - name: CODE_SERVER_PORT
              value: "13337"
            - name: VNC_PORT
              value: "5901"
            - name: JUPYTER_PORT
              value: "8888"
          ports:
            - name: novnc
              containerPort: 6080
            - name: vscode
              containerPort: 13337
            - name: jupyter
              containerPort: 8888
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: dev-workspace-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: dev-environment
  labels:
    app: dev-environment
spec:
  selector:
    app: dev-environment
  type: ClusterIP
  ports:
    - name: novnc
      port: 6080
      targetPort: novnc
    - name: vscode
      port: 13337
      targetPort: vscode
    - name: jupyter
      port: 8888
      targetPort: jupyter
